version: '3'
services:
  frontend:
    image: node:18
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"

  backend:
    image: maven:3.9.6-eclipse-temurin-17
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "mvn spring-boot:run"
    ports:
      - "8080:8080"

  ai:
    image: node:18
    working_dir: /app
    volumes:
      - ./ai-service:/app
    command: sh -c "npm install && node server.js"
    ports:
      - "3000:3000"

  db:
    image: postgres
    environment:
      POSTGRES_PASSWORD: password
